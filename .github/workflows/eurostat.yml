name: Data Update

on:
  schedule:
    - cron: '0 6 * * 1'    # Kazdy pondelok -- Eurostat + SUSR
    - cron: '0 6 1 * *'    # 1. den v mesiaci -- BuiltWith scrape
  workflow_dispatch:        # Manualny trigger z GitHub UI

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch Eurostat data
        run: python3 scripts/eurostat_updater.py
        timeout-minutes: 5

      - name: Fetch SR data
        run: python3 scripts/susr_updater.py
        timeout-minutes: 5

      - name: Scrape BuiltWith Slovakia
        run: python3 scripts/builtwith_updater.py
        timeout-minutes: 5

      - name: Check if data changed
        id: check_changes
        run: |
          if git diff --quiet data/; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Ziadne zmeny."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Data sa zmenili."
          fi

      - name: Commit updated data
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --global user.name "Slovak E-commerce Bot"
          git config --global user.email "bot@slovakecommerce.sk"
          git add data/
          git commit -m "auto: data update $(date '+%Y-%m-%d')"
          git push

      - name: Trigger Vercel redeploy
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}" \
            -H "Content-Type: application/json" \
            --fail-with-body || echo "Deploy hook optional"
        continue-on-error: true
