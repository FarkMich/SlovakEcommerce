<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slovak e-commerce | Pracujeme na stránke</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preload" href="/fonts/sora-800-latin.woff2" as="font" type="font/woff2" crossorigin>
<link rel="stylesheet" href="/css/fonts.css">
<style>
:root {
  --bg: #18120a;
  --gold: #d4a55a;
  --white: #f0e8d8;
  --white70: rgba(240,232,216,0.72);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--white);
  font-family: 'Sora', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 2rem;
}
.wrap {
  max-width: 480px;
}
.icon {
  font-size: 3rem;
  margin-bottom: 1.5rem;
  opacity: 0.7;
}
h1 {
  font-size: 1.6rem;
  font-weight: 800;
  color: var(--gold);
  margin-bottom: 0.75rem;
  letter-spacing: -0.02em;
}
p {
  font-size: 1rem;
  font-weight: 300;
  color: var(--white70);
  line-height: 1.6;
}
</style>
</head>
<body>
<div class="wrap">
  <div class="icon">&#9881;</div>
  <h1>Na stránke sa pracuje</h1>
  <p>Pripravujeme pre vás novú verziu. Vrátime sa čoskoro.</p>
</div>
</body>
</html>
